services:
  postgres:
    image: postgres:16-alpine
    container_name: stageai-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stageai
      POSTGRES_PASSWORD: stageai_local
      POSTGRES_DB: stageai
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
